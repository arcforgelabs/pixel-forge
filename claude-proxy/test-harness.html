<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pixel-forge Test Harness</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="flex h-screen">
        <!-- Left: App Viewer -->
        <div class="flex-1 flex flex-col">
            <div class="bg-gray-800 p-3 flex items-center justify-between">
                <h2 class="font-semibold">App Viewer</h2>
                <div class="flex items-center gap-2">
                    <input
                        type="text"
                        id="target-url"
                        value="http://localhost:3000"
                        class="bg-gray-700 text-white px-3 py-1 rounded text-sm w-64"
                        placeholder="Target app URL"
                    >
                    <button
                        id="load-btn"
                        class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm"
                    >
                        Load
                    </button>
                    <button
                        id="select-btn"
                        class="bg-gray-600 hover:bg-gray-700 px-3 py-1 rounded text-sm"
                    >
                        Select Mode: OFF
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-white">
                <iframe
                    id="app-frame"
                    src="http://localhost:7001/app/"
                    class="w-full h-full border-0"
                ></iframe>
            </div>
        </div>

        <!-- Right: Selection Info -->
        <div class="w-96 bg-gray-800 flex flex-col">
            <div class="p-3 border-b border-gray-700">
                <h2 class="font-semibold">Selected Element</h2>
            </div>
            <div class="flex-1 overflow-auto p-3">
                <div id="selection-info" class="text-gray-400 text-sm">
                    <p>Click "Select Mode" then click on an element in the app to inspect it.</p>
                </div>
            </div>
            <div class="p-3 border-t border-gray-700">
                <textarea
                    id="instruction"
                    class="w-full bg-gray-700 text-white rounded p-2 text-sm resize-none"
                    rows="3"
                    placeholder="Tell Claude what to change about this element..."
                ></textarea>
                <button
                    id="send-btn"
                    class="w-full mt-2 bg-green-600 hover:bg-green-700 py-2 rounded text-sm font-medium disabled:opacity-50"
                    disabled
                >
                    Send to Claude
                </button>
            </div>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('app-frame');
        const selectBtn = document.getElementById('select-btn');
        const loadBtn = document.getElementById('load-btn');
        const targetUrlInput = document.getElementById('target-url');
        const selectionInfo = document.getElementById('selection-info');
        const instructionInput = document.getElementById('instruction');
        const sendBtn = document.getElementById('send-btn');

        let selectMode = false;
        let selectedElement = null;

        // Toggle select mode
        selectBtn.addEventListener('click', () => {
            selectMode = !selectMode;
            selectBtn.textContent = `Select Mode: ${selectMode ? 'ON' : 'OFF'}`;
            selectBtn.classList.toggle('bg-green-600', selectMode);
            selectBtn.classList.toggle('bg-gray-600', !selectMode);

            // Send message to iframe
            iframe.contentWindow.postMessage({
                type: 'pixel-forge-toggle-select',
                enabled: selectMode
            }, '*');
        });

        // Load new app
        loadBtn.addEventListener('click', async () => {
            const targetUrl = targetUrlInput.value;

            // Configure proxy
            await fetch('http://localhost:7001/config/app-proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_url: targetUrl })
            });

            // Reload iframe
            iframe.src = 'http://localhost:7001/app/';
        });

        // Listen for selection messages from iframe
        window.addEventListener('message', (e) => {
            if (e.data.type === 'pixel-forge-element-selected') {
                selectedElement = e.data.data;
                displaySelection(selectedElement);
                sendBtn.disabled = false;
            } else if (e.data.type === 'pixel-forge-cancel-select') {
                selectMode = false;
                selectBtn.textContent = 'Select Mode: OFF';
                selectBtn.classList.remove('bg-green-600');
                selectBtn.classList.add('bg-gray-600');
            }
        });

        // Display selection info
        function displaySelection(data) {
            const html = `
                <div class="space-y-3">
                    <div>
                        <label class="text-gray-500 text-xs uppercase">Tag</label>
                        <p class="font-mono text-blue-400">&lt;${data.tagName}&gt;</p>
                    </div>
                    ${data.id ? `
                    <div>
                        <label class="text-gray-500 text-xs uppercase">ID</label>
                        <p class="font-mono text-green-400">#${data.id}</p>
                    </div>
                    ` : ''}
                    ${data.classList.length ? `
                    <div>
                        <label class="text-gray-500 text-xs uppercase">Classes</label>
                        <p class="font-mono text-yellow-400">.${data.classList.join('.')}</p>
                    </div>
                    ` : ''}
                    <div>
                        <label class="text-gray-500 text-xs uppercase">Text Content</label>
                        <p class="text-gray-300 truncate">${escapeHtml(data.textContent.slice(0, 100))}</p>
                    </div>
                    <div>
                        <label class="text-gray-500 text-xs uppercase">XPath</label>
                        <p class="font-mono text-purple-400 text-xs break-all">${data.xpath}</p>
                    </div>
                    <div>
                        <label class="text-gray-500 text-xs uppercase">Outer HTML</label>
                        <pre class="bg-gray-900 p-2 rounded text-xs overflow-auto max-h-40 text-gray-300">${escapeHtml(data.outerHTML)}</pre>
                    </div>
                </div>
            `;
            selectionInfo.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send to Claude (placeholder for now)
        sendBtn.addEventListener('click', async () => {
            const instruction = instructionInput.value.trim();
            if (!instruction || !selectedElement) return;

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            // Format the update instruction with element context
            const fullInstruction = `${instruction} referring to this element specifically: ${selectedElement.outerHTML}`;

            console.log('Would send to Claude:', {
                instruction: fullInstruction,
                element: selectedElement
            });

            // TODO: Wire up to actual Claude proxy update endpoint
            alert('Selection captured! In the full implementation, this would be sent to Claude.\n\nElement: ' + selectedElement.tagName + '\nInstruction: ' + instruction);

            sendBtn.textContent = 'Send to Claude';
            sendBtn.disabled = false;
        });
    </script>
</body>
</html>
