<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual to Code - Claude Code Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-container {
            max-height: 70vh;
            overflow-y: auto;
        }
        .code-preview {
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Visual to Code</h1>
            <p class="text-gray-600">Upload a design image and convert it to HTML/Tailwind code using Claude</p>
            <div class="mt-2 inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">
                Claude Code Edition (Subagent Delegation)
            </div>
        </div>

        <!-- Upload Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left: Upload -->
            <div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold mb-4">Upload Design</h2>

                    <!-- File Input -->
                    <div class="mb-4">
                        <label class="block w-full">
                            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-500 transition">
                                <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <p class="text-gray-600">Click to upload or drag and drop</p>
                                <p class="text-sm text-gray-500 mt-2">PNG, JPG, JPEG, WEBP</p>
                            </div>
                            <input type="file" id="imageInput" accept="image/png,image/jpeg,image/jpg,image/webp" class="hidden">
                        </label>
                    </div>

                    <!-- Preview -->
                    <div id="previewSection" class="hidden">
                        <h3 class="font-medium mb-2">Preview:</h3>
                        <div class="preview-container border border-gray-200 rounded-lg p-4 bg-gray-50">
                            <img id="preview" class="max-w-full h-auto rounded" />
                        </div>
                    </div>

                    <!-- Generate Button -->
                    <button id="generateBtn" class="mt-4 w-full bg-blue-600 text-white py-3 px-6 rounded-lg font-medium hover:bg-blue-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
                        Generate Code
                    </button>

                    <!-- Status -->
                    <div id="status" class="mt-4 hidden">
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                            <p class="text-blue-700 font-medium" id="statusText">Processing...</p>
                        </div>
                    </div>

                    <!-- Error -->
                    <div id="error" class="mt-4 hidden">
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-700" id="errorText"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Output -->
            <div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">Generated Code</h2>
                        <button id="copyBtn" class="hidden bg-gray-100 text-gray-700 py-2 px-4 rounded-lg font-medium hover:bg-gray-200 transition">
                            Copy Code
                        </button>
                    </div>

                    <div id="output" class="code-preview bg-gray-900 text-gray-100 rounded-lg p-4 font-mono text-sm overflow-x-auto hidden">
                        <pre id="codeOutput"></pre>
                    </div>

                    <div id="placeholder" class="flex items-center justify-center h-96 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
                        <p class="text-gray-400">Generated code will appear here</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const imageInput = document.getElementById('imageInput');
        const previewSection = document.getElementById('previewSection');
        const preview = document.getElementById('preview');
        const generateBtn = document.getElementById('generateBtn');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const error = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const output = document.getElementById('output');
        const codeOutput = document.getElementById('codeOutput');
        const placeholder = document.getElementById('placeholder');
        const copyBtn = document.getElementById('copyBtn');

        let currentImage = null;

        // File Upload Handlers
        dropzone.addEventListener('click', () => imageInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageUpload(file);
            }
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageUpload(file);
            }
        });

        function handleImageUpload(file) {
            currentImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                previewSection.classList.remove('hidden');
                generateBtn.disabled = false;
                hideStatus();
                hideError();
                hideOutput();
            };
            reader.readAsDataURL(file);
        }

        // Generate Button Handler
        generateBtn.addEventListener('click', async () => {
            if (!currentImage) return;

            showStatus('Sending request to Claude Code subagent...');
            hideError();
            hideOutput();
            generateBtn.disabled = true;

            try {
                // Convert image to base64
                const base64 = await fileToBase64(currentImage);

                // Call backend API (which will delegate to Claude Code subagent)
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: base64,
                        mediaType: currentImage.type
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Display generated code
                showOutput(data.code);
                hideStatus();

            } catch (err) {
                showError(err.message || 'Failed to generate code');
                hideStatus();
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Copy Button Handler
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeOutput.textContent);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = 'Copy Code';
            }, 2000);
        });

        // Helper Functions
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showStatus(message) {
            statusText.textContent = message;
            status.classList.remove('hidden');
        }

        function hideStatus() {
            status.classList.add('hidden');
        }

        function showError(message) {
            errorText.textContent = message;
            error.classList.remove('hidden');
        }

        function hideError() {
            error.classList.add('hidden');
        }

        function showOutput(code) {
            codeOutput.textContent = code;
            output.classList.remove('hidden');
            placeholder.classList.add('hidden');
            copyBtn.classList.remove('hidden');
        }

        function hideOutput() {
            output.classList.add('hidden');
            placeholder.classList.remove('hidden');
            copyBtn.classList.add('hidden');
        }
    </script>
</body>
</html>
