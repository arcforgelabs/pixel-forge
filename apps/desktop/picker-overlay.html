<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pixel Forge Picker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        background: transparent;
      }

      body {
        overflow: hidden;
      }

      .panel {
        margin: 0;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 12px;
        background: rgba(13, 16, 23, 0.98);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        overflow: hidden;
      }

      .list {
        max-height: 100%;
        overflow-y: auto;
        padding: 6px 0;
      }

      .item {
        width: 100%;
        border: 0;
        background: transparent;
        color: #d7dde8;
        font: inherit;
        text-align: left;
        padding: 10px 14px;
        cursor: pointer;
        display: block;
      }

      .item:hover,
      .item[data-active="true"] {
        background: rgba(34, 197, 94, 0.12);
        color: #86efac;
      }

      .label {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="list" class="list"></div>
    </div>
    <script>
      const list = document.getElementById('list')
      let items = []
      let activeIndex = -1

      function render() {
        list.innerHTML = ''
        items.forEach((item, index) => {
          const button = document.createElement('button')
          button.type = 'button'
          button.className = 'item'
          button.dataset.active = String(index === activeIndex)
          button.innerHTML = `<span class="label"></span>`
          button.querySelector('.label').textContent = item.label
          button.addEventListener('mouseenter', () => {
            activeIndex = index
            render()
          })
          button.addEventListener('pointerdown', (event) => {
            event.preventDefault()
            window.pixelForgeOverlay.select(item.value)
          })
          list.appendChild(button)
        })

        const active = list.children[activeIndex]
        if (active) {
          active.scrollIntoView({ block: 'nearest' })
        }
      }

      window.addEventListener('pixel-forge-overlay:list-init', (event) => {
        items = Array.isArray(event.detail?.items) ? event.detail.items : []
        const selectedValue = event.detail?.selectedValue ?? null
        activeIndex = Math.max(0, items.findIndex((item) => item.value === selectedValue))
        render()
      })

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          window.pixelForgeOverlay.cancel()
          return
        }
        if (event.key === 'ArrowDown') {
          event.preventDefault()
          activeIndex = Math.min(items.length - 1, activeIndex + 1)
          render()
          return
        }
        if (event.key === 'ArrowUp') {
          event.preventDefault()
          activeIndex = Math.max(0, activeIndex - 1)
          render()
          return
        }
        if (event.key === 'Enter' && activeIndex >= 0 && items[activeIndex]) {
          event.preventDefault()
          window.pixelForgeOverlay.select(items[activeIndex].value)
        }
      })
    </script>
  </body>
</html>
