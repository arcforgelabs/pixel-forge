<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Updating Pixel Forge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --card: rgba(17, 20, 24, 0.96);
        --border: rgba(72, 223, 166, 0.24);
        --muted: #94a3b8;
        --text: #f8fafc;
        --accent: #48dfa6;
        --track: rgba(148, 163, 184, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(72, 223, 166, 0.08), transparent 45%),
          var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
      }

      .card {
        width: min(460px, calc(100vw - 28px));
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--card);
        padding: 22px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .phase {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 600;
      }

      .message {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.5;
        min-height: 42px;
      }

      .progress {
        margin-top: 16px;
        height: 10px;
        width: 100%;
        overflow: hidden;
        border-radius: 999px;
        background: var(--track);
      }

      .progress-bar {
        height: 100%;
        width: 8%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(72, 223, 166, 0.82), rgba(108, 244, 190, 1));
        transition: width 220ms ease;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .error {
        margin-top: 14px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(248, 113, 113, 0.35);
        background: rgba(127, 29, 29, 0.22);
        color: #fecaca;
        display: none;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Updating Pixel Forge</div>
      <div id="phase" class="phase">Preparing</div>
      <div id="message" class="message">Starting the update runner…</div>
      <div class="progress">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="meta">
        <span id="hint">This window will close when the update is done.</span>
        <span id="progress-label">0%</span>
      </div>
      <div id="error" class="error"></div>
    </main>

    <script>
      const phaseEl = document.getElementById("phase");
      const messageEl = document.getElementById("message");
      const progressBarEl = document.getElementById("progress-bar");
      const progressLabelEl = document.getElementById("progress-label");
      const errorEl = document.getElementById("error");

      function labelForPhase(phase) {
        switch (phase) {
          case "installing":
            return "Installing";
          case "restarting":
            return "Restarting";
          case "waiting":
            return "Waiting";
          case "finalizing":
            return "Finalizing";
          case "relaunching":
            return "Relaunching";
          case "done":
            return "Done";
          case "error":
            return "Error";
          default:
            return "Preparing";
        }
      }

      let doneTimer = null;

      async function poll() {
        const state = await window.pixelForgeUpdater.getState();
        const progress = Math.max(8, Number(state?.progress || 0));

        phaseEl.textContent = labelForPhase(state?.phase);
        messageEl.textContent =
          state?.message || "Applying the staged controller update…";
        progressBarEl.style.width = `${progress}%`;
        progressLabelEl.textContent = `${Math.round(Number(state?.progress || 0))}%`;

        if (state?.status === "error") {
          errorEl.style.display = "block";
          errorEl.textContent = state?.error || "Unknown updater error.";
          return;
        }

        if (state?.status === "done" || state?.phase === "done") {
          if (!doneTimer) {
            doneTimer = window.setTimeout(() => {
              window.close();
            }, 900);
          }
          return;
        }

        errorEl.style.display = "none";
      }

      void poll();
      window.setInterval(() => {
        void poll();
      }, 500);
    </script>
  </body>
</html>
