name: Release npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release package gates
        env:
          CI: '1'
        run: |
          pnpm check:version
          pnpm check:shell
          pnpm check:api
          pnpm check:desktop
          pnpm lint:web
          pnpm test:web
          pnpm check:web
          pnpm test:retired-lane-env
          pnpm smoke:install
          pnpm smoke:gui
          # Direct provider live smokes require a local authenticated Codex CLI.
          # Keep them in VM release proof instead of the npm publish runner.
          pnpm smoke:update

      - name: Dry-run npm packages
        run: |
          npm pack --dry-run --json ./packages/npm-installer
          npm pack --dry-run --json ./packages/sdk-node

      - name: Verify npm token
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish installer package
        run: npm publish ./packages/npm-installer --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish SDK package
        run: npm publish ./packages/sdk-node --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
