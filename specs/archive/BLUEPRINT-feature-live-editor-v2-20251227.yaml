# Implementation Order
implementation_order:
  phase_1:
    name: Foundation
    tasks: [task_1_1, task_2_3]
    rationale: State management must come first

  phase_2:
    name: Chat Components
    tasks: [task_1_2, task_1_3, task_1_4]
    rationale: UI components can be built in parallel

  phase_3:
    name: Backend Streaming
    tasks: [task_1_5]
    rationale: Backend must support streaming before integration

  phase_4:
    name: Selection Persistence
    tasks: [task_2_1, task_2_2]
    rationale: Build on state foundation

  phase_5:
    name: Multi-Select
    tasks: [task_3_1, task_3_2, task_3_3]
    rationale: Extends persistence feature

  phase_6:
    name: Integration
    tasks: [task_1_6]
    rationale: Final assembly after all components ready

# Acceptance Criteria
acceptance_criteria:
  feature_1:
    - Streaming responses appear character-by-character
    - Tool executions show in collapsible cards
    - Chat history persists across page refreshes
    - Can have multi-turn conversations with context

  feature_2:
    - Selected element stays highlighted after selection
    - Can click elsewhere without losing selection
    - Can explicitly deselect via X button
    - Multiple selections show in sidebar list

  feature_3:
    - Ctrl+click adds to selection
    - Regular click replaces selection
    - Context chips show all selected elements
    - Can remove individual elements from context
    - Claude receives all selected elements as context

# Technical Decisions
decisions:
  state_management: Zustand (matches aim-up, already in screenshot-to-code)
  streaming_format: stream-json from Claude CLI
  markdown_rendering: react-markdown (existing in codebase)
  ui_components: Existing shadcn/ui components
