# Blueprint: Live Editor v2
# Type: feature
# Created: 2025-12-27
# Tracking: document-based

meta:
  name: live-editor-v2
  type: feature
  description: Enhanced Live Editor with full chat interface, persistent element selection, and multi-select capabilities
  depth_limit: 2
  tracking_method: document

  # Research sources
  references:
    - path: ~/repos/2-areas/aim-up
      patterns:
        - Streaming WebSocket chat with Claude CLI
        - Zustand store for chat state management
        - Tool visualization with collapsible ToolCard components
        - Session persistence via localStorage
    - url: https://github.com/open-webui/open-webui
      patterns:
        - Svelte-based responsive chat UI
        - PWA support
        - Markdown rendering

# Current State Analysis
current_state:
  location: /home/samuel/repos/1-projects/pixel-forge/screenshot-to-code/frontend/src/components/live-editor/
  files:
    - LiveEditorPane.tsx  # Single file, ~314 lines
  capabilities:
    - Single element selection with highlight overlay
    - Instruction textarea (not chat)
    - WebSocket to /edit-element endpoint
    - Basic response display (no streaming)
    - Auto-refresh after Claude completes
  limitations:
    - No chat history or conversation context
    - No tool visualization (Claude's actions hidden)
    - Selection lost on click outside
    - Only one element at a time
    - No streaming response feedback

# Feature Breakdown
features:
  - id: feature_1
    name: Full Chat Interface
    description: Replace instruction textarea with full chat UI supporting streaming responses and tool visualization
    complexity:
      scope: 3        # New component architecture
      technical: 3    # WebSocket streaming, state management
      uncertainty: 2  # Patterns proven in aim-up
      dependencies: 2 # Builds on existing WebSocket
      risk: 2         # Can iterate safely
      composite: 2.4
    tasks:
      - id: task_1_1
        name: Create chat store with Zustand
        description: |
          Port chat-store pattern from aim-up:
          - messages array with user/assistant/tool roles
          - sessionId with localStorage persistence
          - isStreaming and currentStreamContent for buffering
          - currentTool for active tool tracking
          - WebSocket connection management
        complexity:
          scope: 2
          technical: 2
          uncertainty: 1  # Direct port from aim-up
          dependencies: 1
          risk: 1
          composite: 1.4
        files:
          - create: src/components/live-editor/store/chat-store.ts
        reference: ~/repos/2-areas/aim-up/dashboard/frontend/src/store/chat-store.ts

      - id: task_1_2
        name: Create ChatMessages component
        description: |
          Scrollable message area with:
          - User messages (right-aligned, accent bg)
          - Assistant messages (left-aligned, markdown rendered)
          - Streaming indicator (animated dots)
          - Current streaming content with cursor
          - Auto-scroll to bottom
        complexity:
          scope: 2
          technical: 2
          uncertainty: 1
          dependencies: 1
          risk: 1
          composite: 1.4
        files:
          - create: src/components/live-editor/ChatMessages.tsx
        reference: ~/repos/2-areas/aim-up/dashboard/frontend/src/components/chat/ChatMessages.tsx

      - id: task_1_3
        name: Create ToolCard component
        description: |
          Collapsible tool visualization cards:
          - Icon mapping (Read, Bash, Edit, Write, Glob, Grep)
          - Running state with spinner
          - Complete state with checkmark
          - Error state with red border
          - Expandable output preview (max 32 lines)
        complexity:
          scope: 2
          technical: 2
          uncertainty: 1
          dependencies: 1
          risk: 1
          composite: 1.4
        files:
          - create: src/components/live-editor/ToolCard.tsx
        reference: ~/repos/2-areas/aim-up/dashboard/frontend/src/components/chat/SimpleChatView.tsx (lines 69-113)

      - id: task_1_4
        name: Create ChatInput component
        description: |
          Auto-expanding textarea input:
          - Enter to send, Shift+Enter for newline
          - Disabled during streaming
          - Clear on send
          - Max height constraint
        complexity:
          scope: 1
          technical: 1
          uncertainty: 1
          dependencies: 1
          risk: 1
          composite: 1.0
        files:
          - create: src/components/live-editor/ChatInput.tsx
        reference: ~/repos/2-areas/aim-up/dashboard/frontend/src/components/chat/ChatInput.tsx

      - id: task_1_5
        name: Update backend /edit-element for streaming
        description: |
          Modify claude-proxy to support streaming responses:
          - Use --output-format stream-json
          - Parse and forward chunk/tool_use/tool_result/complete messages
          - Keep existing non-streaming mode as fallback
        complexity:
          scope: 2
          technical: 3
          uncertainty: 2
          dependencies: 2
          risk: 2
          composite: 2.2
        files:
          - modify: claude-proxy/main.py
        reference: ~/repos/2-areas/aim-up/dashboard/backend/services/claude_cli.py

      - id: task_1_6
        name: Integrate chat UI into LiveEditorPane
        description: |
          Replace right sidebar content:
          - Remove instruction textarea and basic response display
          - Add ChatMessages + ChatInput components
          - Wire up to chat store
          - Include selected elements as context chips above chat
        complexity:
          scope: 2
          technical: 2
          uncertainty: 2
          dependencies: 3  # Depends on all above tasks
          risk: 2
          composite: 2.2
        files:
          - modify: src/components/live-editor/LiveEditorPane.tsx

  - id: feature_2
    name: Persistent Element Selection
    description: Selected elements remain highlighted in iframe until explicitly deselected
    complexity:
      scope: 2
      technical: 2
      uncertainty: 2
      dependencies: 1
      risk: 1
      composite: 1.6
    tasks:
      - id: task_2_1
        name: Update selection script for persistence
        description: |
          Modify injected SELECTION_SCRIPT in app_proxy.py:
          - Don't auto-clear highlight on new selection
