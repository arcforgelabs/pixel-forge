blueprint_type: rework
created: 2025-12-12
rework_reason: "Migrate from standalone web app to Claude Code-integrated architecture with phased rollout"
affected_scope: "Entire toolkit - SDK, CLI, Web App, and new orchestration layer"
tracking_method: document

project_overview:
  brief: "Transform visual-to-code toolkit from isolated web app to Claude Code-integrated system, exposing all 7 output formats from upstream fork (HTML/CSS, HTML/Tailwind, React/Tailwind, Bootstrap, Vue/Tailwind, Ionic/Tailwind, SVG) with iterative refinement capabilities."
  core_objectives:
    - "Validate existing HTML/Tailwind API foundation works correctly (Phase 1)"
    - "Integrate Claude Code as primary execution engine with terminal spawning and output capture (Phases 2-4)"
    - "Enable all 7 output formats through systematic backend prompt migration"
    - "Implement iterative eval feedback via reflex toolkit integration (Phase 5)"
    - "Provide skill-orchestrated workflow for preference management and visual generation"

architecture:
  pattern: "layered"
  rationale: "Layered architecture fits this project's clear separation of concerns: API layer (routes/controllers), Web UI (presentation), Tools (application/CLI), SDK (business logic). Team is familiar with traditional patterns, and CRUD-style operations dominate the workflow."
  source_structure:
    api: "API layer - routes, controllers for web app backend"
    web: "Presentation layer - React UI components"
    tools: "Application layer - CLI tools, orchestration scripts"
    sdk: "Business logic - core generation, format handling"
    backend: "Upstream fork integration - prompt templates, LLM handling"

